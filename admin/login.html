<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - AL-WAHA CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
    }
    .login-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .login-card h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      margin: 0 0 8px;
      text-align: center;
    }
    .login-card .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 32px;
    }
    .login-card .form-group {
      margin-bottom: 20px;
    }
    .login-card label {
      display: block;
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .login-card input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .login-card input:focus {
      border-color: rgba(212, 175, 55, 0.6);
    }
    .login-card .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #d4af37, #c7982e);
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .login-card .btn-login:hover { opacity: 0.9; }
    .login-card .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      color: #f44;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>AL-WAHA CMS</h1>
      <p class="subtitle">Admin Login</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
        <div class="login-error" id="loginError"></div>
      </form>
    </div>
  </div>

  <script>
    (function() {
      var API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
        ? 'http://localhost:3001/api'
        : '/api';

      document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = document.getElementById('loginBtn');
        var err = document.getElementById('loginError');
        btn.disabled = true;
        btn.textContent = 'Signing in...';
        err.textContent = '';

        try {
          var res = await fetch(API + '/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: document.getElementById('username').value,
              password: document.getElementById('password').value
            })
          });
          var data = await res.json();
          if (res.ok) {
            localStorage.setItem('alwaha_token', data.token);
            localStorage.setItem('alwaha_user', JSON.stringify(data.user));
            var redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';
            location.href = redirect;
          } else {
            err.textContent = data.error || 'Login failed';
          }
        } catch (ex) {
          err.textContent = 'Network error — check API server';
        }
        btn.disabled = false;
        btn.textContent = 'Sign In';
      });
    })();
  </script>
</body>
</html>
